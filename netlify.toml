[build]
command = "npm run build"
publish = "out"

[build.environment]
NODE_VERSION = "20"

# Proxy n8n webhook requests (carried over from existing config)
[[redirects]]
from = "/api/webhook/*"
to = "https://evhand.app.n8n.cloud/webhook/:splat"
status = 200
force = true

# Vite app assets — JS/CSS bundles loaded by the proxied app pages
[[redirects]]
from = "/assets/*"
to = "https://stirring-griffin-e64878.netlify.app/assets/:splat"
status = 200

# App routes — proxy to the Vite app
[[redirects]]
from = "/register"
to = "https://stirring-griffin-e64878.netlify.app/register"
status = 200

[[redirects]]
from = "/login"
to = "https://stirring-griffin-e64878.netlify.app/login"
status = 200

[[redirects]]
from = "/dashboard/*"
to = "https://stirring-griffin-e64878.netlify.app/dashboard/:splat"
status = 200

[[redirects]]
from = "/setup-wizard"
to = "https://stirring-griffin-e64878.netlify.app/setup-wizard"
status = 200

[[redirects]]
from = "/onboarding"
to = "https://stirring-griffin-e64878.netlify.app/onboarding"
status = 200

[[redirects]]
from = "/settings"
to = "https://stirring-griffin-e64878.netlify.app/settings"
status = 200

[[redirects]]
from = "/checkout-success"
to = "https://stirring-griffin-e64878.netlify.app/checkout-success"
status = 200

[[redirects]]
from = "/reset-password"
to = "https://stirring-griffin-e64878.netlify.app/reset-password"
status = 200

# Cache hashed Next.js assets forever (content-hashed filenames)
[[headers]]
for = "/_next/static/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

# Cache public images for 1 year (we can bust by renaming if needed)
[[headers]]
for = "/*.png"
[headers.values]
Cache-Control = "public, max-age=31536000"

[[headers]]
for = "/*.jpg"
[headers.values]
Cache-Control = "public, max-age=31536000"

[[headers]]
for = "/*.webp"
[headers.values]
Cache-Control = "public, max-age=31536000"

[[headers]]
for = "/testimonials/*"
[headers.values]
Cache-Control = "public, max-age=31536000"

# Cache video assets for 1 year
[[headers]]
for = "/*.mp4"
[headers.values]
Cache-Control = "public, max-age=31536000"

[[headers]]
for = "/*.webm"
[headers.values]
Cache-Control = "public, max-age=31536000"
