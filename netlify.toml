[build]
command = "npm run build"
publish = "out"

[build.environment]
NODE_VERSION = "20"

# Proxy n8n webhook requests (carried over from existing config)
[[redirects]]
from = "/api/webhook/*"
to = "https://evhand.app.n8n.cloud/webhook/:splat"
status = 200
force = true

# App routes — proxy to the Vite app (currently live at thecontentlabs.app)
# NOTE: Before swapping thecontentlabs.app to point to this Netlify site,
# the Vite app must be deployed to a separate Netlify URL and these proxies
# must be updated to point there to avoid circular redirects.
[[redirects]]
from = "/register"
to = "https://thecontentlabs.app/register"
status = 200

[[redirects]]
from = "/login"
to = "https://thecontentlabs.app/login"
status = 200

[[redirects]]
from = "/dashboard/*"
to = "https://thecontentlabs.app/dashboard/:splat"
status = 200

[[redirects]]
from = "/setup-wizard"
to = "https://thecontentlabs.app/setup-wizard"
status = 200

[[redirects]]
from = "/onboarding"
to = "https://thecontentlabs.app/onboarding"
status = 200

[[redirects]]
from = "/settings"
to = "https://thecontentlabs.app/settings"
status = 200

[[redirects]]
from = "/checkout-success"
to = "https://thecontentlabs.app/checkout-success"
status = 200

[[redirects]]
from = "/reset-password"
to = "https://thecontentlabs.app/reset-password"
status = 200

# Cache hashed assets
[[headers]]
for = "/_next/static/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.png"
[headers.values]
Cache-Control = "public, max-age=2592000"
