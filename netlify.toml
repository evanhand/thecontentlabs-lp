[build]
command = "npm run build"
publish = "out"

[build.environment]
NODE_VERSION = "20"

# Proxy n8n webhook requests (carried over from existing config)
[[redirects]]
from = "/api/webhook/*"
to = "https://evhand.app.n8n.cloud/webhook/:splat"
status = 200
force = true

# App routes — proxy to Vite app (update URL after creating secondary site)
[[redirects]]
from = "/register"
to = "https://spontaneous-sawine-4f97b9.netlify.app/register"
status = 200
force = true

[[redirects]]
from = "/login"
to = "https://spontaneous-sawine-4f97b9.netlify.app/login"
status = 200
force = true

[[redirects]]
from = "/dashboard/*"
to = "https://spontaneous-sawine-4f97b9.netlify.app/dashboard/:splat"
status = 200
force = true

# All other routes — proxy to Vite app
[[redirects]]
from = "/*"
to = "https://spontaneous-sawine-4f97b9.netlify.app/:splat"
status = 200
force = true

# Cache hashed assets
[[headers]]
for = "/_next/static/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.png"
[headers.values]
Cache-Control = "public, max-age=2592000"
